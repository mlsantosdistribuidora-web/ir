<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Santos Distribuidora — Conectando ao WhatsApp</title>
<meta name="robots" content="noindex">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=AW-11068534946"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'AW-11068534946');
</script>

<style>
  html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif;
    background:#0b3d2e;color:#fff;display:flex;align-items:center;justify-content:center;text-align:center}
  .box{padding:24px}
  .spinner{width:48px;height:48px;border:5px solid rgba(255,255,255,.3);
    border-top-color:#25D366;border-radius:50%;margin:0 auto 20px;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{font-size:20px;font-weight:600;margin:0 0 8px}
  p{font-size:14px;opacity:.85;margin:0}
  a{color:#25D366;font-weight:bold}
</style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h1>Conectando voce ao nosso WhatsApp...</h1>
    <p>Se nao for redirecionado, <a id="manual" href="#">clique aqui</a>.</p>
  </div>

<script>
  // URL de destino — WhatsApp Business ML Santos.
  // Aceita ?text= na propria URL do anuncio para personalizar a mensagem.
  var params = new URLSearchParams(window.location.search);
  var msg = params.get('text') || 'Ola! Vim pelo Google e quero um orcamento.';
  var dest = 'https://wa.me/5521999716972?text=' + encodeURIComponent(msg);

  document.getElementById('manual').href = dest;

  // Dispara a conversao do Google Ads e SO ENTAO redireciona (event_callback).
  // Fallback de 1,5s garante o redirect mesmo se a tag falhar/for bloqueada.
  var redirected = false;
  function go(){ if(redirected) return; redirected = true; window.location.href = dest; }

  try {
    gtag('event', 'conversion', {
      'send_to': 'AW-11068534946/KkkTCM6vn8QcEKLh8Z0p',
      'event_callback': go
    });
  } catch(e) { /* segue para o fallback */ }

  setTimeout(go, 1500);
</script>
</body>
</html>
